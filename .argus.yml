# Argus scanning itself (dogfooding). A security tool that visibly scans its own
# source with a clean result is its own best advertisement, see the self-scan
# CI workflow (.github/workflows/argus-scan.yml).
#
# The only exclusions here are paths that necessarily *contain* attack patterns
# as data rather than as vulnerabilities:
#   - the scanners' own rule definitions embed the very strings they detect
#     (e.g. the LLM rule text mentions `trust_remote_code=True`);
#   - the example app is deliberately vulnerable so the scanners have targets;
#   - benchmark corpora are third-party vulnerable apps cloned locally.
exclude_paths:
  - "examples/**"
  - "benchmarks/.corpora/**"
  - "tests/**"
  # Rule/replacement definitions necessarily embed the patterns they detect
  # (the LLM rule text mentions `trust_remote_code=True`; the fix engine's
  # rewrites map `yaml.load`, `verify=False`, weak hashes, …).
  - "src/argus/scanners/llm.py"
  - "src/argus/scanners/patterns.py"
  - "src/argus/scanners/secrets.py"
  - "src/argus/remediation/rewrites.py"
  # Reviewed-safe: a list-form, protocol-restricted, env-hardened git clone.
  # The URL is validated before this call; the taint tier cannot see that
  # across the function. (An inline-suppression mechanism is on the roadmap.)
  - "src/argus/targets.py"

fail_on: high
