name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    name: Test (${{ matrix.os }} · Python ${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest]
        python-version: ["3.10", "3.11", "3.12"]
        # A large share of enterprise developers are on Windows; a scanner that
        # breaks on path separators or symlink handling there is unusable. Cover
        # it on the current Python without tripling the whole matrix.
        include:
          - os: windows-latest
            python-version: "3.12"
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v7
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install
        run: pip install -e ".[dev]"

      - name: Lint
        run: ruff check .

      - name: Type check
        run: mypy || true   # advisory during alpha

      - name: Test
        run: pytest -q --cov=argus --cov-report=term-missing

      - name: Accuracy benchmark (labeled corpus; gates on any miss or false positive)
        run: python benchmarks/accuracy.py

  build-image:
    name: Build Docker image
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - name: Build
        run: docker build -t argus:ci .
      - name: Smoke test the image
        run: docker run --rm -v "$PWD/examples/vulnerable-app:/work" argus:ci scan /work --min-severity high
