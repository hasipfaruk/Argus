# Publish Argus to PyPI when a GitHub Release is published.
#
# Uses PyPI Trusted Publishing (OIDC), no API token or secret is stored in the
# repo. You configure the trust relationship once on PyPI (see RELEASING.md).
#
# For a security tool, release integrity is part of the product: every release
# ships a CycloneDX SBOM and a signed build-provenance attestation, so consumers
# can verify what is in the artifact and that it was built by this pipeline.
name: Publish to PyPI

on:
  release:
    types: [published]

permissions:
  contents: read

jobs:
  build:
    name: Build, SBOM & provenance
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # provenance attestation (OIDC)
      attestations: write # record the attestation
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build sdist and wheel
        run: |
          python -m pip install --upgrade build twine
          python -m build
          python -m twine check dist/*

      - name: Generate CycloneDX SBOM (resolved runtime dependencies)
        run: |
          python -m venv /tmp/sbomenv
          /tmp/sbomenv/bin/pip install --upgrade pip
          /tmp/sbomenv/bin/pip install .
          /tmp/sbomenv/bin/pip install cyclonedx-bom
          mkdir -p sbom
          /tmp/sbomenv/bin/cyclonedx-py environment -o sbom/argus-appsec.cdx.json

      - name: Attest build provenance for the distributions
        uses: actions/attest-build-provenance@v1
        with:
          subject-path: "dist/*"

      - name: Upload distributions
        uses: actions/upload-artifact@v7
        with:
          name: dist
          path: dist/

      - name: Upload SBOM
        uses: actions/upload-artifact@v7
        with:
          name: sbom
          path: sbom/

  publish:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/project/argus-appsec/
    permissions:
      id-token: write # required for trusted publishing (OIDC)
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - name: Publish
        uses: pypa/gh-action-pypi-publish@release/v1

  attach-sbom:
    name: Attach SBOM to the release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write # upload the SBOM as a release asset
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: sbom
          path: sbom/
      - name: Upload SBOM to the release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload "${{ github.event.release.tag_name }}" sbom/argus-appsec.cdx.json --repo "${{ github.repository }}"
