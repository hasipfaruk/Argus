# Example: run Argus in CI and upload results to GitHub Code Scanning.
#
# Copy this into your own repository's .github/workflows/ to get Argus findings
# as annotations on pull requests and in the Security tab. On pull requests the
# scan is *diff-aware*: it first scans the base branch to build a baseline, then
# reports only findings that are new in the PR, so you are never blocked by
# pre-existing issues, only by ones the PR introduces.
name: Argus Security Scan

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read
  security-events: write   # required to upload SARIF

jobs:
  argus:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (full history for baseline diffing)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Argus
        # Install with the [ast] extra so the self-scan runs the full taint tier
        # (the AST analysis clears regex false positives). In your own project,
        # replace this with `pip install "argus-appsec[ast]"` once on PyPI.
        run: pip install ".[ast]"

      # On a pull request, scan the base branch first to establish a baseline of
      # pre-existing findings. Uses a separate worktree so the PR checkout is
      # untouched.
      - name: Build baseline from base branch (PRs only)
        if: github.event_name == 'pull_request'
        run: |
          git worktree add /tmp/base "origin/${{ github.base_ref }}"
          # Write the baseline outside the working tree so it is not itself scanned.
          argus scan /tmp/base -f json -o /tmp/baseline.json --quiet || true

      - name: Run Argus (diff-aware on PRs)
        run: |
          if [ -f /tmp/baseline.json ]; then
            argus scan . -f sarif -o argus.sarif --baseline /tmp/baseline.json --quiet
          else
            argus scan . -f sarif -o argus.sarif --quiet
          fi
        env:
          # Optional: use a cloud model for richer analysis. Omit to run offline.
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

      - name: Upload SARIF to Code Scanning
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: argus.sarif
          category: argus

  # Optional stricter gate: fail the PR if it introduces High+ findings.
  argus-gate:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install ".[ast]"
      - name: Build baseline from base branch
        run: |
          git worktree add /tmp/base "origin/${{ github.base_ref }}"
          argus scan /tmp/base -f json -o /tmp/baseline.json --quiet || true
      - name: Fail on newly introduced High+ findings
        run: argus scan . --baseline /tmp/baseline.json --fail-on high --quiet
