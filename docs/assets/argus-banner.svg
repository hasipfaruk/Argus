<svg xmlns="http://www.w3.org/2000/svg" width="960" height="240" viewBox="0 0 960 240" role="img" aria-label="Argus, the open-source AI Security Engineer">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0b1220"/>
      <stop offset="1" stop-color="#111c33"/>
    </linearGradient>
    <linearGradient id="iris" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#6ea8fe"/>
      <stop offset="1" stop-color="#8b5cf6"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#8b5cf6" stop-opacity="0.35"/>
      <stop offset="1" stop-color="#8b5cf6" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="960" height="240" rx="18" fill="url(#bg)"/>
  <circle cx="150" cy="120" r="120" fill="url(#glow)"/>

  <!-- Eye of Argus -->
  <g transform="translate(150 120)">
    <path d="M -78 0 Q 0 -58 78 0 Q 0 58 -78 0 Z" fill="none" stroke="#6ea8fe" stroke-width="6"/>
    <circle cx="0" cy="0" r="30" fill="url(#iris)"/>
    <circle cx="0" cy="0" r="12" fill="#0b1220"/>
    <circle cx="-10" cy="-10" r="5" fill="#e8eefc"/>
    <!-- scan line -->
    <line x1="-78" y1="0" x2="78" y2="0" stroke="#8b5cf6" stroke-width="2" stroke-opacity="0.6" stroke-dasharray="4 6"/>
  </g>

  <!-- Wordmark -->
  <text x="300" y="112" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="78" font-weight="700" fill="#e8eefc" letter-spacing="2">ARGUS</text>
  <text x="302" y="152" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="23" font-weight="400" fill="#9db2d9">Open-source AI Security Engineer</text>
  <text x="302" y="185" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="17" font-weight="400" fill="#6ea8fe">Finds it. Explains it. Fixes it. Never sends your code anywhere.</text>
</svg>
