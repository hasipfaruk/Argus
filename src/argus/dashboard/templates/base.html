<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Argus Dashboard{% endblock %}</title>
  <link rel="stylesheet" href="/static/app.css">
</head>
<body>
  <header class="topbar">
    <div class="wrap topbar-inner">
      <a class="brand" href="/">Argus</a>
      <nav class="nav">
        <a href="/">Projects</a>
        <a href="/upload">Add scan</a>
      </nav>
      <button id="theme-toggle" class="icon-btn" aria-label="Toggle color theme">☾</button>
    </div>
  </header>
  <main class="wrap main">
    {% block content %}{% endblock %}
  </main>
  <footer class="wrap footer">Argus Dashboard · v{{ argus_version }}</footer>
  <script src="/static/app.js"></script>
</body>
</html>
