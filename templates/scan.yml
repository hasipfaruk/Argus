# Argus AppSec GitLab CI/CD component.
#
# Adds a security scan that publishes findings as a GitLab SAST report, so they
# appear in the merge-request security widget. Use it from your .gitlab-ci.yml:
#
#   include:
#     - component: $CI_SERVER_FQDN/Argus-CodeSecurity/Argus-appsec/scan@main
#       inputs:
#         fail-on: high
#
spec:
  inputs:
    stage:
      default: test
      description: "Pipeline stage to run the scan in."
    path:
      default: "."
      description: "Path to scan, relative to the project root."
    fail-on:
      default: "high"
      description: "Fail the job if any finding is at or above this severity (empty to never fail)."
    min-severity:
      default: "low"
      description: "Only report findings at or above this severity."
---
argus-scan:
  stage: $[[ inputs.stage ]]
  image: python:3.12-slim
  script:
    - pip install --no-cache-dir argus-appsec
    - >-
      argus scan "$[[ inputs.path ]]"
      -f gitlab -o gl-sast-report.json
      --min-severity "$[[ inputs.min-severity ]]"
      --fail-on "$[[ inputs.fail-on ]]"
  artifacts:
    when: always
    reports:
      sast: gl-sast-report.json
    paths:
      - gl-sast-report.json
