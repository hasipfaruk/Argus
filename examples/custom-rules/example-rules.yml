# Example Argus custom rules. Copy this to `.argus/rules/` in your project
# (auto-loaded), or point `scanner_options.patterns.rules` at it in .argus.yml.
# No Python required, a rule is a regex plus some metadata.
#
# See docs/plugins.md ("Community rules") for the full field reference.
rules:
  - id: hardcoded-internal-ip
    title: Hardcoded internal IP address
    pattern: '\b(?:10\.\d{1,3}|192\.168|172\.(?:1[6-9]|2\d|3[01]))\.\d{1,3}\.\d{1,3}\b'
    severity: low
    cwe: [CWE-1188]
    owasp: ["A05:2021-Security Misconfiguration"]
    confidence: low
    why: >-
      A private/internal IP address is hardcoded in source, coupling the code to
      one environment and leaking internal network layout.
    attack: Map internal infrastructure from committed addresses.
    impact: Environment coupling and internal-topology disclosure.
    fix: Move host addresses into configuration or service discovery.
    # A line containing this marker is treated as an accepted exception.
    suppress: 'argus:allow-internal-ip'

  - id: insecure-http-url
    title: Insecure http:// URL in source
    pattern: '["'']http://(?!localhost|127\.0\.0\.1)[^"'' ]+'
    severity: low
    languages: [Python, JavaScript, TypeScript, Go]
    cwe: [CWE-319]
    owasp: ["A02:2021-Cryptographic Failures"]
    why: A plaintext http:// endpoint transmits data without encryption.
    fix: Use https:// endpoints.
